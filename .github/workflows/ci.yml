name: CI

on:
  push:
    branches: [main, 'claude/**']
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Type-check
        run: npm run typecheck
      - name: Unit tests
        run: npm test
      - name: Build
        run: npm run build

  e2e-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Install Chromium system libraries
        run: npx playwright install-deps chromium
      - name: Build
        run: npm run build
      - name: Serve build and run smoke test
        run: |
          npx vite preview --port 4173 --strictPort &
          curl -s --retry 40 --retry-delay 1 --retry-connrefused http://localhost:4173/ -o /dev/null
          SMOKE_URL=http://localhost:4173 npm run smoke
